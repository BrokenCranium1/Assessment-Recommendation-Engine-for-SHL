<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHL Assessment Recommender | AI-Powered Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        textarea {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.2rem;
            color: var(--text);
            font-size: 1rem;
            resize: none;
            height: 120px;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 16px;
            padding: 0 2rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            height: 120px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results {
            margin-top: 2rem;
        }

        .assessment-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .assessment-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(99, 102, 241, 0.4);
            transform: scale(1.01);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
        }

        .badges {
            display: flex;
            gap: 0.5rem;
        }

        .badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .badge-type { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3); }
        .badge-info { background: rgba(236, 72, 153, 0.15); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.2); }

        .card-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .view-btn {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: gap 0.3s ease;
        }

        .view-btn:hover {
            gap: 0.5rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <h1>SHL Assessment AI</h1>
        <p class="subtitle">Intelligent Recommendation Engine for Modern Hiring</p>
    </header>

    <div class="container">
        <div class="search-box">
            <textarea id="queryInput" placeholder="Enter job description or natural language query (e.g. 'Need a Java developer who is good in collaborating with external teams')"></textarea>
            <button id="recommendBtn">
                <span class="btn-text">Recommend</span>
                <div class="loader" id="loader"></div>
            </button>
        </div>

        <div id="results" class="results">
            <div class="empty-state">
                Enter a query above to see AI-powered assessment recommendations.
            </div>
        </div>
    </div>

    <script>
        const queryInput = document.getElementById('queryInput');
        const recommendBtn = document.getElementById('recommendBtn');
        const loader = document.getElementById('loader');
        const resultsContainer = document.getElementById('results');
        const btnText = document.querySelector('.btn-text');

        // Live Railway backend URL
        const API_BASE = 'https://shl-api-production-7f65.up.railway.app';

        recommendBtn.addEventListener('click', async () => {
            const query = queryInput.value.trim();
            if (!query) return;

            // UI State
            recommendBtn.disabled = true;
            loader.style.display = 'block';
            btnText.style.display = 'none';
            resultsContainer.style.opacity = '0.5';

            try {
                const response = await fetch(`${API_BASE}/recommend`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!response.ok) throw new Error(`API request failed: ${response.status}`);

                const data = await response.json();
                renderResults(data);
            } catch (error) {
                console.error(error);
                resultsContainer.innerHTML = `<div class="empty-state" style="color: #f87171">
                    Error connecting to recommendation engine.<br>
                    <small>${error.message}</small><br>
                    <small>Backend URL: ${API_BASE}</small>
                </div>`;
            } finally {
                recommendBtn.disabled = false;
                loader.style.display = 'none';
                btnText.style.display = 'block';
                resultsContainer.style.opacity = '1';
            }
        });

        function renderResults(assessments) {
            if (!assessments || assessments.length === 0) {
                resultsContainer.innerHTML = `<div class="empty-state">No assessments found matching your query.</div>`;
                return;
            }

            resultsContainer.innerHTML = assessments.map(item => `
                <div class="assessment-card">
                    <div class="card-header">
                        <div class="card-title">${item.name}</div>
                        <div class="badges">
                            ${item.test_type.map(type => `<span class="badge badge-type">Type ${type}</span>`).join('')}
                        </div>
                    </div>
                    <div class="card-desc">${item.description || 'No description available for this assessment.'}</div>
                    <div class="card-footer">
                        <div class="badges">
                            <span class="badge badge-info">Duration: ${item.duration} min</span>
                            ${item.remote_support === 'Yes' ? '<span class="badge badge-info">Remote Ready</span>' : ''}
                            ${item.adaptive_support === 'Yes' ? '<span class="badge badge-info">Adaptive</span>' : ''}
                        </div>
                        <a href="${item.url}" target="_blank" class="view-btn">View Details ↗</a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
